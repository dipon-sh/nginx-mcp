vhost_traffic_status_zone;

limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
limit_req_status 429;
limit_req_log_level error;

log_format detailed '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'upstream=$upstream_response_time '
                    'limit=$limit_req_status';

# Public traffic
server {
    listen 80;
    server_name localhost;

    access_log /var/log/nginx/access.log detailed;
    error_log  /var/log/nginx/error.log error;

    location = /health {
        limit_req zone=mylimit burst=5 nodelay;
        default_type text/plain;
        root /etc/nginx/conf.d/static;
        try_files /health =404;
    }

    location / {
        limit_req zone=mylimit burst=20 nodelay;
        default_type text/plain;
        root /etc/nginx/conf.d/static;
        try_files /index =404;
    }
}

# Internal metrics — only reachable within Docker network (port not exposed to host)
server {
    listen 8080;
    server_name localhost;

    access_log off;

    location /status {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format html;
    }

    location /status/format/prometheus {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format prometheus;
    }

    location /status/format/json {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format json;
    }
}
